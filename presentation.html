<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCL AI Requirements Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8;
  --white: #FFFFFF;
  --ink: #0F2340;
  --ink2: #3D5068;
  --ink3: #7A8FA6;
  --red: #2B6CB0;
  --red-lt: #EEF4FB;
  --rule: #E4E8EC;
  --green: #2D7A3A;
  --green-lt: #F3FAF5;
  --gold: #6B4E0A;
  --gold-lt: #FFFCF0;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'Instrument Serif', Georgia, serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
button { font-family: inherit; cursor: pointer; }

.app { display: flex; flex-direction: column; height: 100vh; }

/* Header */
.header { padding: 12px 20px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 14px; background: var(--white); flex-shrink: 0; }
.header-logo { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-logo svg { width: 60px; height: 60px; }
.header-text { display: flex; flex-direction: column; }
.header-brand { font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: 0.02em; }
.header-brand em { color: var(--red); font-style: normal; }
.header-sub { font-size: 10px; color: var(--ink3); font-family: var(--mono); letter-spacing: 0.04em; margin-top: 1px; }
.header-counter { margin-left: auto; color: var(--ink3); font-size: 11px; font-family: var(--mono); }

/* Main layout */
.main { display: flex; flex: 1; min-height: 0; }

/* Sidebar */
.sidebar { width: 240px; border-right: 1px solid var(--rule); padding: 8px 0; overflow-y: auto; flex-shrink: 0; background: var(--white); }
.nav-group { margin-bottom: 4px; }
.nav-group-header { padding: 14px 16px 6px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); font-weight: 500; }
.nav-btn { display: flex; align-items: center; width: 100%; padding: 8px 16px 8px 24px; background: transparent; border: none; border-left: 2px solid transparent; text-align: left; transition: all 0.15s; font-size: 12px; color: var(--ink3); }
.nav-btn:hover { background: var(--bg); color: var(--ink2); }
.nav-btn.active { background: var(--bg); border-left-color: var(--red); color: var(--ink); font-weight: 500; }

/* Content */
.content { flex: 1; padding: 28px 40px; overflow-y: auto; }
.content-header { margin-bottom: 20px; }
.content-header h2 { font-size: 24px; font-weight: 600; line-height: 1.2; }
.content-header .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }

/* Title slide */
.title-slide { min-height: calc(100vh - 180px); display: flex; flex-direction: column; justify-content: center; padding: 20px 40px; max-width: 880px; margin: 0 auto; }
.title-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--red); margin-bottom: 32px; display: flex; align-items: center; gap: 14px; }
.title-eyebrow::before { content: ''; width: 28px; height: 2px; background: var(--red); display: inline-block; }
.title-heading { font-family: var(--serif); font-size: 72px; line-height: 1.05; color: var(--ink); margin-bottom: 20px; font-weight: 400; }
.title-heading em { color: var(--red); font-style: italic; }
.title-subheading { font-size: 20px; line-height: 1.5; color: var(--ink2); margin-bottom: 48px; max-width: 640px; }
.title-meta { display: flex; gap: 32px; padding-top: 24px; border-top: 1px solid var(--rule); }
.title-meta-item { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); }
.title-meta-item strong { display: block; color: var(--ink); font-weight: 500; margin-top: 4px; font-size: 13px; letter-spacing: 0.04em; }

/* Overview slide */
.overview-grid { display: grid; grid-template-columns: 360px 1fr; gap: 48px; align-items: start; }
.overview-body { font-size: 14px; color: var(--ink2); line-height: 1.8; }
.overview-body p { margin-bottom: 14px; }
.overview-body strong { color: var(--ink); font-weight: 500; }
.overview-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule); border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; }
.ostat { background: var(--bg); padding: 24px 20px; transition: background 0.2s; }
.ostat:hover { background: var(--white); }
.ostat-num { font-family: var(--serif); font-size: 44px; color: var(--ink); line-height: 1; margin-bottom: 6px; }
.ostat-num em { color: var(--red); font-style: normal; }
.ostat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); line-height: 1.5; }
.overview-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
.overview-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--rule); border-radius: 2px; padding: 5px 10px; color: var(--ink2); background: var(--white); }
.overview-tag.accent { background: var(--ink); color: var(--bg); border-color: var(--ink); }

.doc-outline { margin-top: 32px; }
.doc-outline-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.doc-outline-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
.doc-outline-sections { display: flex; flex-direction: column; gap: 6px; }
.doc-outline-item { background: var(--white); border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; transition: all 0.15s; }
.doc-outline-item.expanded { border-color: var(--red); }
.doc-outline-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; transition: background 0.15s; }
.doc-outline-header:hover { background: var(--bg); }
.doc-outline-num { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--red); min-width: 28px; }
.doc-outline-title { font-size: 14px; font-weight: 500; color: var(--ink); flex: 1; }
.doc-outline-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; color: var(--ink3); background: var(--bg); padding: 3px 8px; border-radius: 3px; }
.doc-outline-chevron { color: var(--ink3); font-size: 12px; transition: transform 0.2s; }
.doc-outline-item.expanded .doc-outline-chevron { transform: rotate(90deg); }
.doc-outline-detail { display: none; padding: 0 18px 16px 58px; }
.doc-outline-item.expanded .doc-outline-detail { display: block; }
.doc-outline-desc { font-size: 13px; color: var(--ink2); line-height: 1.65; margin-bottom: 10px; }
.doc-outline-subs { display: flex; flex-direction: column; gap: 4px; }
.doc-outline-sub { font-size: 12px; color: var(--ink3); line-height: 1.5; padding: 4px 0; border-bottom: 1px solid var(--rule); }
.doc-outline-sub:last-child { border-bottom: none; }
.doc-outline-sub strong { color: var(--ink2); font-weight: 500; }
.doc-outline-sub.clickable { cursor: pointer; padding: 6px 8px; border-radius: 3px; border-bottom: none; margin-bottom: 2px; transition: background 0.15s; }
.doc-outline-sub.clickable:hover { background: var(--bg); }
.doc-outline-sub.clickable.active { background: var(--red-lt); }
.doc-outline-sub-text { display: flex; align-items: center; gap: 6px; }
.doc-outline-sub-chevron { color: var(--ink3); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
.doc-outline-sub.active .doc-outline-sub-chevron { transform: rotate(90deg); color: var(--red); }
.doc-outline-sub-summary { display: none; font-size: 12px; color: var(--ink2); line-height: 1.65; padding: 8px 0 4px 16px; border-left: 2px solid var(--red); margin: 6px 0 2px 4px; }
.doc-outline-sub.active .doc-outline-sub-summary { display: block; }

/* Navigation footer */
.nav-footer { display: flex; justify-content: space-between; margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--rule); }
.nav-footer button { padding: 10px 24px; background: var(--white); border: 1px solid var(--rule); border-radius: 4px; color: var(--ink3); font-size: 13px; transition: all 0.15s; }
.nav-footer button:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }
.nav-footer button:disabled { color: var(--rule); cursor: default; }
.nav-footer button.primary { background: var(--red-lt); border-color: var(--red); color: var(--red); }

/* ═══════════════════════════════════════════════════════════════
   ML WALKTHROUGH STYLES
   ═══════════════════════════════════════════════════════════════ */

.wt-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--rule); }
.wt-dots { display: flex; gap: 6px; flex: 1; }
.wt-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rule); border: none; cursor: pointer; transition: all 0.2s; }
.wt-dot:hover { background: var(--ink3); }
.wt-dot.active { background: var(--red); transform: scale(1.3); }
.wt-dot.done { background: var(--green); }
.wt-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); }
.wt-arrows { display: flex; gap: 6px; }
.wt-arrow { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--rule); background: var(--white); color: var(--ink3); font-size: 12px; display: flex; align-items: center; justify-content: center; }
.wt-arrow:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }
.wt-arrow:disabled { opacity: 0.3; cursor: default; }

.wt-step { display: none; animation: wtFade 0.3s ease; }
.wt-step.active { display: block; }
@keyframes wtFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.wt-title { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }
.wt-text { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 16px; }
.wt-text strong { color: var(--ink); font-weight: 500; }

/* Panels */
.wt-panel { background: var(--white); border: 1px solid var(--rule); border-radius: 6px; padding: 20px; margin-bottom: 16px; }
.wt-panel-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px; }
.wt-panel-red { border-top: 3px solid var(--red); }
.wt-panel-green { border-top: 3px solid var(--green); }
.wt-panel-gold { border-top: 3px solid var(--gold); }

/* Callout */
.wt-callout { padding: 14px 18px; background: var(--red-lt); border-left: 3px solid var(--red); border-radius: 0 4px 4px 0; margin-top: 16px; }
.wt-callout p { font-size: 13px; color: var(--ink2); line-height: 1.65; margin: 0; }
.wt-callout strong { color: var(--ink); }
.wt-callout-green { background: var(--green-lt); border-left-color: var(--green); }

/* Email samples */
.wt-emails { display: flex; flex-direction: column; gap: 10px; }
.wt-email { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; background: var(--bg); border-radius: 4px; border-left: 3px solid transparent; }
.wt-email.spam { border-left-color: var(--red); background: var(--red-lt); }
.wt-email.ham { border-left-color: var(--green); background: var(--green-lt); }
.wt-email-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; width: 50px; flex-shrink: 0; padding-top: 2px; }
.wt-email.spam .wt-email-tag { color: var(--red); }
.wt-email.ham .wt-email-tag { color: var(--green); }
.wt-email-content { font-size: 13px; color: var(--ink); line-height: 1.5; }
.wt-email-content .hl { background: rgba(43,108,176,0.15); padding: 1px 4px; border-radius: 2px; }

/* Tokenization */
.wt-token-flow { display: flex; flex-direction: column; gap: 12px; }
.wt-token-row { display: flex; align-items: center; gap: 10px; }
.wt-token-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); width: 70px; flex-shrink: 0; }
.wt-tokens { display: flex; flex-wrap: wrap; gap: 6px; }
.wt-token { padding: 4px 10px; background: var(--bg); border: 1px solid var(--rule); border-radius: 3px; font-family: var(--mono); font-size: 11px; color: var(--ink2); }
.wt-token.hl { background: var(--red-lt); border-color: rgba(43,108,176,0.3); color: var(--red); }
.wt-arrow-down { text-align: center; color: var(--ink3); font-size: 18px; padding: 4px 0; }

/* Embedding visualization */
.wt-embed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.wt-embed-word { text-align: center; padding: 16px; background: var(--bg); border-radius: 6px; }
.wt-embed-word-label { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 10px; }
.wt-embed-word-label.red { color: var(--red); }
.wt-embed-dims { font-family: var(--mono); font-size: 10px; color: var(--ink3); line-height: 1.6; }
.wt-embed-dims span { display: inline-block; padding: 2px 5px; margin: 2px; background: var(--white); border-radius: 2px; }

/* Loss function */
.wt-loss-eq { font-family: var(--mono); font-size: 14px; color: var(--ink); background: var(--bg); padding: 16px 20px; border-radius: 4px; border-left: 3px solid var(--red); margin-bottom: 12px; }

/* Training visualization */
.wt-train-wrap { position: relative; }
.wt-train-canvas { width: 100%; max-width: 600px; height: 200px; background: var(--bg); border-radius: 6px; position: relative; overflow: hidden; margin: 0 auto; }
.wt-train-dot { position: absolute; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); transition: all 0.8s ease-out; cursor: pointer; }
.wt-train-dot::after { content: attr(data-word); position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; color: var(--ink2); white-space: nowrap; }
.wt-train-dot.money { background: var(--red); }
.wt-train-dot.related { background: var(--ink); }
.wt-train-dot.unrelated { background: var(--ink3); }
.wt-train-cluster { position: absolute; border: 2px dashed rgba(43,108,176,0.25); border-radius: 50%; pointer-events: none; transition: all 0.8s ease-out; }
.wt-train-controls { display: flex; align-items: center; gap: 16px; margin-top: 14px; }
.wt-train-btn { padding: 10px 20px; background: var(--red); color: var(--white); border: none; border-radius: 4px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; }
.wt-train-btn:hover { background: var(--ink); }
.wt-train-btn:disabled { background: var(--rule); cursor: default; }
.wt-train-epoch { font-family: var(--mono); font-size: 12px; color: var(--ink3); }
.wt-train-loss { font-family: var(--mono); font-size: 12px; color: var(--ink2); }
.wt-train-loss span { color: var(--red); font-weight: 600; }

/* Result space */
.wt-space { position: relative; height: 220px; max-width: 600px; background: var(--bg); border-radius: 6px; margin: 0 auto 12px; }
.wt-space-axis { position: absolute; font-family: var(--mono); font-size: 9px; color: var(--ink3); }
.wt-space-axis.left { left: 10px; top: 50%; transform: translateY(-50%); }
.wt-space-axis.right { right: 10px; top: 50%; transform: translateY(-50%); }
.wt-space-dot { position: absolute; width: 14px; height: 14px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; transition: transform 0.2s; }
.wt-space-dot:hover { transform: translate(-50%, -50%) scale(1.3); }
.wt-space-dot::after { content: attr(data-word); position: absolute; top: 18px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; color: var(--ink2); white-space: nowrap; }
.wt-space-dot.money { background: var(--red); }
.wt-space-dot.related { background: var(--ink); }
.wt-space-dot.unrelated { background: var(--ink3); }
.wt-space-cluster { position: absolute; border: 2px dashed rgba(43,108,176,0.3); border-radius: 50%; pointer-events: none; }
.wt-space-insight { font-size: 13px; color: var(--ink2); line-height: 1.6; padding: 12px 14px; background: var(--white); border-radius: 4px; border: 1px solid var(--rule); }

/* The problem */
.wt-search-box { padding: 16px; background: var(--bg); border-radius: 6px; margin-bottom: 12px; }
.wt-search-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; }
.wt-search-weights { font-family: var(--mono); font-size: 10px; color: var(--ink3); line-height: 1.7; word-break: break-all; min-height: 60px; }
.wt-search-weights span { display: inline-block; padding: 2px 4px; margin: 1px; background: var(--white); border-radius: 2px; transition: all 0.1s; }
.wt-search-weights span.hl { background: var(--red); color: var(--white); }
.wt-search-btn { margin-top: 12px; padding: 10px 20px; background: var(--white); border: 1px solid var(--rule); border-radius: 4px; font-family: var(--mono); font-size: 11px; color: var(--ink2); }
.wt-search-btn:hover { border-color: var(--ink); color: var(--ink); }
.wt-search-result { margin-top: 12px; font-size: 13px; line-height: 1.6; }
.wt-search-result.fail { color: var(--red); }

.trad-kw { transition: all 0.3s; }

/* Compare columns */
.wt-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.wt-compare-col { padding: 16px; border-radius: 6px; }
.wt-compare-col.trad { background: var(--green-lt); border: 1px solid rgba(45,122,58,0.2); }
.wt-compare-col.ai { background: var(--red-lt); border: 1px solid rgba(43,108,176,0.2); }
.wt-compare-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.wt-compare-col.trad .wt-compare-label { color: var(--green); }
.wt-compare-col.ai .wt-compare-label { color: var(--red); }
.wt-compare-text { font-size: 13px; color: var(--ink); line-height: 1.6; }

/* ═══════════════════════════════════════════════════════════════
   OTHER CONTENT TYPE STYLES
   ═══════════════════════════════════════════════════════════════ */

.intro { color: var(--ink2); font-size: 14px; margin-bottom: 20px; line-height: 1.7; }
.block { margin-bottom: 16px; padding: 18px 22px; background: var(--white); border: 1px solid var(--rule); border-radius: 4px; }
.block.highlight { background: var(--red-lt); border-color: rgba(43,108,176,0.2); border-left: 3px solid var(--red); }
.block h4 { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
.block.highlight h4 { color: var(--red); }
.block p { color: var(--ink2); font-size: 14px; line-height: 1.7; margin: 0; }

.features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.feature { padding: 20px; background: var(--white); border: 1px solid var(--rule); border-radius: 4px; }
.feature .title { font-weight: 600; color: var(--ink); font-size: 15px; margin-bottom: 8px; }
.feature p { color: var(--ink2); font-size: 13px; line-height: 1.65; margin: 0; }

.callout { margin-top: 20px; padding: 14px 18px; background: var(--red-lt); border-left: 3px solid var(--red); border-radius: 0 4px 4px 0; }
.callout p { color: var(--ink2); font-size: 13px; line-height: 1.65; margin: 0; }

.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab-btn { padding: 8px 20px; background: var(--white); border: 1px solid var(--rule); border-radius: 4px; color: var(--ink3); font-size: 13px; font-weight: 500; }
.tab-btn:hover { border-color: var(--ink3); }
.tab-btn.active { background: var(--red-lt); border-color: var(--red); color: var(--red); }
.tab-content { background: var(--white); border-radius: 4px; padding: 20px; border: 1px solid var(--rule); }
.tab-content h4 { color: var(--ink); margin: 0 0 16px; font-size: 15px; }
.tab-item { padding: 12px 0; border-bottom: 1px solid var(--rule); }
.tab-item:last-child { border-bottom: none; }
.tab-item .phase { color: var(--ink); font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.tab-item .desc { color: var(--ink2); font-size: 13px; line-height: 1.6; }
.tab-note { margin-top: 16px; padding: 12px 14px; background: var(--bg); border-radius: 4px; font-size: 12px; color: var(--ink3); font-style: italic; }

/* Visual Comparison Timeline */
.comp-timeline { position: relative; margin-top: 20px; }
.comp-phase { display: flex; gap: 20px; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid var(--rule); position: relative; opacity: 0.35; transition: opacity 0.4s ease; }
.comp-phase.revealed { opacity: 1; }
.comp-phase:last-child { border-bottom: none; }
.comp-phase-marker { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; border: 2px solid var(--rule); background: var(--white); transition: all 0.4s ease; }
.comp-phase.revealed .comp-phase-marker { border-color: currentColor; }
.comp-phase-marker.status-ok { color: #2D7A3A; }
.comp-phase.revealed .comp-phase-marker.status-ok { background: rgba(45,122,58,0.08); }
.comp-phase-marker.status-warn { color: #C8861A; }
.comp-phase.revealed .comp-phase-marker.status-warn { background: rgba(200,134,26,0.08); }

        { id: "AI-2",  short: "Bias",                            q: "Does the model behave equitably across the populations it will serve?" },
        { id: "AI-3",  short: "ML Test Coverage",                q: "Is the test coverage appropriate to a model, not to a function?" },
        { id: "AI-4",  short: "Continuous Validation",           q: "Does the model stay in spec as the world shifts around it?" },
        { id: "AI-5",  short: "Hallucination Prevention",        q: "What happens when the model produces a confident wrong answer?" },
        { id: "AI-6",  short: "Out of Distribution Detection",   q: "What happens when an input falls outside what the model was trained on?" },
        { id: "AI-7",  short: "Adversarial Robustness",          q: "Does the model hold up under adversarial pressure?" },
        { id: "AI-8",  short: "Explainability",                  q: "Can an operator tell why the model decided what it decided?" },
        { id: "AI-9",  short: "Human AI Teaming",                q: "Is a human positioned to override when the stakes require it?" },
        { id: "AI-10", short: "Privacy and Data Protection",     q: "Is personal data handled lawfully throughout the pipeline?" }
      ],
      closer: "Certification is not a claim that the weights are correct. Certification is a claim that the envelope around the weights is complete. Each of the ten requirements that follows is one wall of that envelope."
    }
  },
  "framework-overview": {
    group: "The Framework", title: "Framework Overview", type: "overview",
    data: {
      body: "<p>The SCL AI Requirements Framework is a published standard for assessing AI systems in safety critical environments. Version 2.1.1 covers the complete lifecycle from operational scope and data governance through operational monitoring, privacy, and human oversight.</p><p>The document defines <strong>ten requirement sets</strong> (AI-1 through AI-10), each paired with a corresponding verification method. Every requirement has a verification. Every verification traces to a requirement. Nothing is assessed without a defined method for assessing it.</p><p>The framework's vocabulary is anchored in ISO/IEC and NIST terminology, supplemented with framework specific terms introduced where existing standards did not cover the gap.</p>",
      stats: [
        { num: "10", unit: "", label: "Requirement Sets" },
        { num: "3", unit: "", label: "Classification Tiers" },
        { num: "4", unit: "", label: "Main Sections" },
        { num: "4", unit: "", label: "Appendices" },
        { num: "8", unit: "", label: "ODD Attribute Categories" },
        { num: "5", unit: "", label: "Threshold Categories" }
      ],
      tags: [
        { text: "CC BY 4.0", accent: true },
        { text: "Published with DOI", accent: true },
        { text: "V2.1.1", accent: false },
        { text: "ISO/IEC & NIST Aligned", accent: false },
        { text: "Domain Standards Cited Inline", accent: false },
        { text: "Every R Has a V", accent: false }
      ],
      outline: [
        { num: "1", title: "Introduction", badge: "Scope & Classification", desc: "Establishes the framework's purpose, defines what constitutes an AI system, and determines which requirements apply based on consequence classification.",
          subs: [
            { text: "1.1 Purpose and rationale for AI specific requirements", summary: "AI behavior emerges from training data rather than explicit code. This breaks the traceability assumption that underpins traditional verification. The framework exists because existing software assurance standards were written for systems where a reviewer can read the artifact and trace it to a requirement." },
            { text: "1.2 Scope, applicability criteria, and AI system classification (three tiers)", summary: "Defines what qualifies as an AI system and assigns it to one of three classification tiers (Safety Critical, Mission Critical, Operational Support) based on consequence of failure. Classification drives which requirements apply and how much tailoring is permitted." },
            { text: "1.2.3 Gap analysis: traditional software assumptions vs. AI/ML reality", summary: "Maps the specific ways traditional software assumptions break with AI: unbounded operational scope, training data integrity and traceability, bias and fairness, no test coverage equivalent, static after deployment, unpredictable outputs, OOD vulnerability, adversarial vulnerability, decision opacity, operator trust, and personal data protection. Each gap traces to the requirement set that addresses it." },
            { text: "1.2.5 Tailoring authority by classification level", summary: "Defines who can approve tailoring (reducing or modifying requirements) at each tier. Safety Critical requires Project Safety Review Board approval. Mission Critical requires Chief Engineer approval with documented rationale. Operational Support permits tailoring with Software Assurance authority approval." },
            { text: "1.3 Normative references and domain standards citation convention", summary: "Lists the external standards the framework aligns with: ISO/IEC 22989, ISO/IEC 5338, NIST AI RMF, DO-178C, ISO 26262, ISO/IEC 27701, ISO/IEC 29100, NIST Privacy Framework, EU AI Act, and related privacy regulations (GDPR, HIPAA, CCPA). Each Section 2 requirement cites applicable domain standards inline by domain (General, Aviation, Automotive, Medical, EU, Cross-Domain) to support regulatory harmonization." },
            { text: "1.4 Verb conventions: shall (requirement), should (guidance), will (expectation)", summary: "Three verbs carry specific meaning. 'Shall' denotes a requirement with a formal verification in Section 2. 'Should' denotes informative guidance in Section 4 with no verification requirement. 'Will' denotes an expectation met by the sum of its supporting 'shall' statements." },
            { text: "1.5 Threshold category definitions (performance, confidence, drift, OOD, escalation)", summary: "Five threshold categories every AI system must document regardless of classification: performance degradation, confidence, data drift, out of distribution detection, and human escalation. The categories are mandatory. The actual values are project defined. Section 4.1 provides example ranges." }
          ]
        },
        { num: "2", title: "Requirements", badge: "AI-1 through AI-10", desc: "Ten requirement sets, each addressing a specific AI failure mode not covered by traditional software verification. Verifications are placed alongside requirements for traceability.",
          subs: [
            { text: "AI-1 Operational and Data Foundations", summary: "Establishes operational scope and data integrity sufficient to support reliable model behavior. Covers Operational Design Domain declaration (AI-1.0), dataset separation, partition use restriction, data provenance, ground truth labeling quality, and classification handling controls (pre-ingestion screening, inheritance, output awareness, audit trail)." },
            { text: "AI-2 Addressing AI Bias", summary: "Requires bias risk assessment identifying protected classes and demographic groups, performance monitoring across those groups, and documented mitigation when disparities are found. Ensures the model performs equitably across all operational populations." },
            { text: "AI-3 ML Test Coverage", summary: "Defines test coverage methods for ML models where traditional code coverage metrics do not apply. Covers input domain coverage, boundary analysis, and edge case testing. Requires documented coverage criteria appropriate to the AI function." },
            { text: "AI-4 Continuous Validation", summary: "Requires ongoing monitoring for performance degradation and data drift after deployment. Defines revalidation triggers when thresholds are exceeded. Establishes surveillance intervals based on classification level." },
            { text: "AI-5 Hallucination Prevention", summary: "Requires defined criteria for what constitutes a hallucination for each AI function, detection mechanisms, response procedures (quarantine, block autonomous execution, trigger human review), and event logging. Safety Critical systems require independent output validation using dissimilar methods." },
            { text: "AI-6 Out-of-Distribution Detection", summary: "Requires statistical characterization of the training data distribution, runtime detection of inputs falling outside that distribution, defined fallback behavior when OOD inputs are detected, and event logging for trend analysis." },
            { text: "AI-7 Adversarial Robustness", summary: "Requires threat modeling for adversarial attacks on inputs, training data, and model parameters. Includes adversarial testing and defense validation. Applies fully to Safety Critical systems. Tailored for Mission Critical." },
            { text: "AI-8 Explainability", summary: "Requires decision explanations sufficient for operators to verify AI reasoning and establish appropriate trust. Covers decision attribution methods, operator comprehension validation, and explanation fidelity (ensuring explanations accurately reflect the model's actual reasoning)." },
            { text: "AI-9 Human-AI Teaming", summary: "Requires support for effective human oversight: trust calibration mechanisms, override authority for safety critical actions, and maintained situational awareness. The human remains the final authority. The AI supports, informs, and defers." },
            { text: "AI-10 Privacy and Data Protection", summary: "Requires personal data protection mechanisms for AI systems that process personal data. Covers personal data identification and minimization, lawful basis and consent, data subject rights, privacy-enhancing techniques, cross-border data transfer controls, privacy impact assessment, and privacy compliance audit trail." }
          ]
        },
        { num: "3", title: "Verification", badge: "Methods & Matrix", desc: "Defines the four verification methods (Inspection, Analysis, Demonstration, Test) tailored for AI/ML, provides the complete verification matrix, and establishes deployment format validation requirements.",
          subs: [
            { text: "3.1 Verification methods defined per IEEE 1012, tailored for AI/ML", summary: "Four methods: Inspection (review of documentation and artifacts), Analysis (evaluation using analytical techniques), Demonstration (functional exercise under defined conditions), and Test (execution with defined inputs and expected outputs). Each is adapted from IEEE 1012 for AI/ML characteristics." },
            { text: "3.2 Verification matrix: requirements mapped to methods and evidence", summary: "The complete traceability matrix mapping every requirement to its verification method and the evidence artifact that satisfies it. Every requirement has a verification. Every verification traces to a requirement. Nothing is assessed without a defined method." },
            { text: "3.3 Deployment format validation", summary: "Validates that the model is not corrupted or degraded during deployment conversion. Covers quantization, pruning, and framework conversion. Ensures the deployed model matches the verified model." }
          ]
        },
        { num: "4", title: "Implementation Guidance", badge: "Informative", desc: "Informative guidance for threshold selection, continuous learning controls, multi model architectures, neural network considerations, and AI specific hazard analysis integration.",
          subs: [
            { text: "4.1 Threshold selection ranges by requirement", summary: "Provides example threshold ranges for bias metrics, drift PSI values, performance degradation limits, and other categories defined in Section 1.5. Informative, not prescriptive. Organizations select values appropriate to their operational context." },
            { text: "4.2 Continuous learning: revalidation scope, approval gates, catastrophic forgetting", summary: "Guidance for systems that continue learning after deployment. Covers how much of the verification must be repeated after each update, approval workflows for model changes, and mitigation of catastrophic forgetting where new learning degrades previously validated capabilities." },
            { text: "4.3 Multi model systems: cascading failures, ensemble voting, confidence aggregation", summary: "Addresses architectures where multiple AI models interact. Covers cascading failure analysis (one model's error propagating through others), ensemble voting strategies, and how to aggregate confidence scores from multiple models." },
            { text: "4.4 Neural networks: explainability, training risks, deployment transformations", summary: "Neural network specific considerations including approaches to explainability (gradient based, attention based, concept based), training risks (overfitting, underfitting, mode collapse), and effects of deployment transformations on model behavior." },
            { text: "4.5 AI specific hazard analysis: augmenting FMEA, FTA, and HAZOP", summary: "How to extend traditional hazard analysis methods for AI failure modes. Traditional FMEA assumes deterministic failure. AI failure modes are probabilistic, context dependent, and may emerge from data rather than component malfunction." }
          ]
        },
        { num: "A", title: "Glossary", badge: "51 Terms", desc: "All defined terms with source traceability. 41 aligned with ISO/IEC 22989, ISO/IEC 5338, and NIST AI RMF. 10 framework specific.", subs: [] },
        { num: "B", title: "Classification Checklist", badge: "Appendix", desc: "Step by step checklist for AI presence screening and consequence based classification determination.", subs: [] },
        { num: "C", title: "Verification Evidence Templates", badge: "Appendix", desc: "Applicability determination record, test report template, and inspection record template.", subs: [] },
        { num: "D", title: "Risk Score Methodology", badge: "Appendix", desc: "Quantitative risk scoring methodology for AI system assessment covering failure mode coverage, consequence severity, evidence quality, and human oversight effectiveness.", subs: [] }
      ]
    }
  },
  "framework-principles": {
    group: "The Process", title: "What Certification Requires", type: "features",
    data: {
      intro: "Three structural conditions separate a credible certification from an internal assessment or self attestation.",
      features: [
        { title: "Independence", desc: "The assessor has no stake in the outcome. The certifying body does not design AI systems, develop mitigations, or serve as a vendor to organizations it assesses." },
        { title: "Published Standard", desc: "Assessment is conducted against a published, versioned standard with a citable DOI. When a regulator asks 'assessed against what?' a DOI is an answer." },
        { title: "Formal Determination", desc: "Every assessment produces a formal determination document regardless of whether the system passes. The record exists whether or not a certificate follows." }
      ],
      callout: "What certification is not: A certificate does not claim the system is safe. It states the system was assessed against a defined standard and met applicable requirements at a defined classification level."
    }
  },
  "ai-presence": {
    group: "The Framework", title: "AI Presence Screening", type: "features",
    data: {
      intro: "Before classification, determine whether the framework applies at all. Four questions screen for AI presence. If any answer is yes, proceed to classification. If all are no, standard software assurance applies and this framework is not required.",
      features: [
        { title: "Learned Behavior", desc: "Does the system use behavior derived from training data rather than explicitly programmed logic? If the system's decisions come from patterns learned during training rather than rules written by a developer, AI is present." },
        { title: "Probabilistic Outputs", desc: "Are system outputs probabilistic or non deterministic? If the same input can produce different outputs, or if outputs carry confidence scores rather than definitive answers, AI is present." },
        { title: "Silent Degradation", desc: "Can system behavior change or degrade over time without code modifications? If the system can become less accurate because the world changed around it while no code was touched, AI is present." },
        { title: "Decision Impact", desc: "Does the system make or inform decisions affecting human safety or operational success? If the system's outputs influence actions where errors have real consequences, AI is present." }
      ],
      callout: "Most real systems are not purely AI. They are traditional software with AI components embedded in the pipeline. The screening identifies where AI is present within a larger system. The boundary between AI and traditional components determines where this framework applies and where your existing V&V processes continue unchanged. Both verification approaches coexist. The framework covers the AI portion. Your existing processes cover the rest."
    }
  },
  "classification": {
    group: "The Framework", title: "Classification Tiers", type: "tiers",
    data: {
      intro: "Classification determines which requirements apply and the level of tailoring authority available. Classification is driven by consequence, not probability.",
      tiers: [
        { name: "Safety Critical AI", color: "red", desc: "AI outputs directly affect human safety or system survivability.", checklistQs: "Could AI malfunction result in loss of life or critical equipment? Is the AI in the control path for safety-critical functions?", examples: "Surgical guidance systems, autonomous vehicle collision avoidance, medical diagnostic AI that determines treatment, flight control systems", reqs: "AI-1 through AI-10 (all requirements, no tailoring without PSRB approval)" },
        { name: "Mission Critical AI", color: "gold", desc: "AI outputs affect operational success but not human safety.", checklistQs: "Could AI malfunction result in loss of operational objectives? Is the AI in the decision path for mission-critical functions?", examples: "Predictive maintenance for aircraft engines, medical triage prioritization, financial fraud detection, spam filter for flight operations communications", reqs: "AI-1 through AI-6, AI-8, AI-9, AI-10; AI-7 tailored (tailoring permitted with CE approval)" },
        { name: "Operational Support AI", color: "blue", desc: "AI supports operations but does not drive critical decisions.", checklistQs: "Does the AI support operations without driving critical decisions?", examples: "Corporate email spam filter, schedule optimization, meeting transcription, documentation assistants", reqs: "AI-1 through AI-6 and AI-10 minimum; AI-7 through AI-9 as tailored (SA approval)" }
      ],
      footer: "The same AI capability can fall into different tiers depending on operational context. A spam filter for marketing emails is Operational Support. A spam filter for flight operations communications could be Mission Critical."
    }
  },
  "just-test-it": {
    group: "The Framework", title: "Why Testing Alone Falls Short", type: "features",
    data: {
      intro: "The natural objection from anyone with a strong testing discipline is: 'If the outputs are correct, who cares what is inside the weights? I will just write a really comprehensive test suite.' This is a reasonable instinct. Here is why it is not sufficient.",
      features: [
        { title: "You Cannot Enumerate What You Did Not Design", desc: "In traditional software, you wrote the rules, so you know what to test. In AI, the model learned its own rules. It may have learned that emails sent at 3am with two exclamation marks correlate with spam. You never wrote that rule. You will never think to test it. Your test suite covers the behaviors you anticipated. The model's behavior includes patterns you never imagined." },
        { title: "The Input Space Is Effectively Infinite", desc: "A spam filter processes natural language. The number of possible inputs is unbounded. Traditional testing works because the logic has finite branches you can enumerate. AI models operate on continuous decision boundaries in high dimensional space. There is no finite set of test cases that covers the space. You choose what to test. You do not know what you are missing." },
        { title: "Aggregate Metrics Hide Specific Failures", desc: "Your test suite reports 94% accuracy. That single number hides everything. The model may be 99% accurate on English emails and 60% accurate on Spanish emails. It may catch every known spam pattern but miss every obfuscated variant. An aggregate pass rate tells you the model works on average. It does not tell you where it fails, or who it fails for." },
        { title: "The World Changes, Your Test Suite Does Not", desc: "You wrote tests for MONEY, CASH, FUNDS. Spammers moved to CRYPTO, NFT, DIGITAL ASSETS. Your test suite still passes because it still tests the old patterns. The model still fails because the real world moved. Testing validates a snapshot. It does not validate ongoing fitness." },
        { title: "Passing Tests Is Not the Same as Understanding Behavior", desc: "A model can pass every test you write and still contain learned behaviors you would reject if you knew about them. Tests confirm specific input output pairs. They do not explain why the model made those decisions, whether it will generalize correctly to similar inputs, or whether it has learned spurious correlations that happen to produce correct answers on your test data." }
      ],
      callout: "Testing is necessary. It is not sufficient. The ten requirements that follow define what else is needed: operational scope, data integrity, bias detection, continuous monitoring, explainability, adversarial robustness, human oversight, and privacy protection. Each one addresses a gap that testing alone cannot close."
    }
  },
  "requirements-overview": {
    group: "The Framework", title: "Ten Requirements", type: "requirements-tabs",
    data: {
      intro: "Each requirement set addresses a specific verification gap that traditional software assurance does not cover. Select a requirement to explore what it means for our spam filter.",
      reqs: [
        {
          id: "AI-1",
          name: "Operational and Data Foundations",
          definition: "The AI system will establish operational scope and data integrity sufficient to support reliable model behavior and a defensible certification claim throughout the model lifecycle.",
          visual: "partition",
          example: "Start with your declared Operational Design Domain (AI-1.0): the environments, input sources, user populations, and regulatory regime the filter is validated for. Then the 10,000 labeled emails are partitioned: training, validation, test, bias evaluation, edge cases, drift baselines, OOD samples, adversarial sets. Data provenance is documented. Ground truth labeling is quality-checked. Classification screening runs before ingestion and classification inheritance is tracked through outputs. AI-1 is the foundation that makes every other requirement verifiable.",
          failure: "No declared ODD means the certificate is unbounded. Test data leaks into training. Model memorizes test examples. Shows 98% accuracy in testing but fails on real emails it has never seen, in conditions the system was never validated against. You deployed a model that only works on data it already knew, with no operational envelope to defend."
        },
        { 
          id: "AI-2", 
          name: "Addressing AI Bias", 
          definition: "The AI system will implement bias detection, prevention, and mitigation mechanisms to provide equitable and unbiased decision-making across all applicable operational scenarios and user populations.",
          visual: "bias",
          example: "Model works great for English emails but flags 40% of Spanish language emails as spam. Finance department emails flagged at 3x the rate of Engineering because training data underrepresented financial terminology in legitimate contexts.",
          failure: "No bias monitoring. Finance team complains for months. Critical vendor payment emails going to spam. By the time anyone investigates, three contracts are in jeopardy."
        },
        { 
          id: "AI-3", 
          name: "ML Test Coverage", 
          definition: "The AI system will demonstrate adequate test coverage for machine learning models using methods appropriate to data-driven systems where traditional code coverage metrics do not apply.",
          visual: "coverage",
          example: "You tested MONEY, CASH, FUNDS. But did you test MONËY with special characters? Did you test emails with urgency patterns but zero financial words? Did you test what happens when sender reputation is unknown?",
          failure: "Spammers find untested patterns. Emails with 'M0NEY' (zero instead of O) sail through. Your test suite passed. Your model failed. The gap was in what you never thought to test."
        },
        { 
          id: "AI-4", 
          name: "Continuous Validation", 
          definition: "The AI system shall implement continuous validation processes to ensure model performance remains within acceptable bounds throughout operational deployment.",
          visual: "drift",
          example: "Weekly accuracy tracking. Spammers shift to crypto terminology. Model trained on MONEY/CASH/FUNDS misses new patterns. Accuracy drops from 94% to 78%. Alert fires at 85% threshold. Retraining triggered before users notice.",
          failure: "No monitoring. Spam detection silently degrades over six months. Users stop trusting the filter. They check spam folders manually. The AI system is running but nobody believes it anymore."
        },
        { 
          id: "AI-5", 
          name: "Hallucination Prevention", 
          definition: "The AI system shall implement mechanisms to detect, prevent, and mitigate AI outputs that are fabricated, unsupported by input data, or inconsistent with operational reality.",
          visual: "hallucination",
          example: "Model flags email as spam with explanation: 'Contains Nigerian prince inheritance scam pattern.' Operator checks the email. It mentions neither Nigeria nor princes nor inheritance. The model invented a justification that sounds plausible but is completely fabricated.",
          failure: "Operators trust fabricated explanations. Wrong emails blocked based on fictional reasoning. A legitimate partnership inquiry from a Nigerian company is rejected. The deal was real. The explanation was not."
        },
        { 
          id: "AI-6", 
          name: "Out-of-Distribution Detection", 
          definition: "The AI system shall detect and appropriately handle inputs that fall outside the distribution of training data.",
          visual: "ood",
          example: "Model trained entirely on text emails. First email arrives with an embedded image and minimal text. Model has never seen this format. OOD detector fires: 'Input format outside training distribution.' Email routed to human review instead of auto-classification.",
          failure: "No OOD detection. Image-based spam sails through because the model outputs random confidence scores on data types it was never trained on. Attackers learn this. All their spam is now image-based."
        },
        { 
          id: "AI-7", 
          name: "Adversarial Robustness", 
          definition: "The AI system shall implement mechanisms to detect, prevent, and mitigate adversarial attacks that could compromise AI integrity, manipulate outputs, or degrade system performance.",
          visual: "adversarial",
          example: "Attacker inserts invisible unicode characters. The word appears as 'MONEY' to humans but the model sees 'M\\u200bO\\u200bN\\u200bE\\u200bY' with zero-width spaces. Tokenization breaks. The spam keyword is invisible to the filter.",
          failure: "Targeted attack bypasses filter. Phishing email reaches CFO. Credentials compromised. Wire transfer initiated. The spam filter was running. It just could not see what it was looking at."
        },
        { 
          id: "AI-8", 
          name: "Explainability", 
          definition: "The AI system shall provide explanations of AI decisions and recommendations sufficient for operators to verify AI reasoning and establish appropriate trust.",
          visual: "explainability",
          example: "Email flagged as spam. Explanation provided: 'Sender not in contacts (30% weight), urgency language detected (25%), financial terms present (45%).' Operator can see why. Operator can verify. Operator can disagree with evidence, not just a label.",
          failure: "Black box output. Email flagged, no reason given. Operator cannot tell if the flag is legitimate. Either blindly trusts every flag or ignores them all. Neither is good. Trust calibration is impossible without explanation."
        },
        {
          id: "AI-9",
          name: "Human-AI Teaming",
          definition: "The AI system shall support effective human-AI collaboration, enabling operators to maintain situational awareness, appropriate trust calibration, and final decision authority over safety-critical actions.",
          visual: "teaming",
          example: "Model flags but does not delete. Emails quarantined for human review. High-confidence spam auto-archived after 30 days. Low-confidence flags require explicit confirmation. One-click override for any decision. The human remains in control.",
          failure: "Auto-delete enabled for 'efficiency.' CEO's urgent email from a new contact (unknown sender, financial terms, urgency language) deleted instantly. The deal that email contained is gone. Nobody knew it existed until the other party called asking why there was no response."
        },
        {
          id: "AI-10",
          name: "Privacy and Data Protection",
          definition: "The AI system will implement personal data protection mechanisms that enable lawful processing, respect data subject rights, and minimize privacy risk throughout the AI lifecycle.",
          visual: "privacy",
          example: "Training corpus contains customer emails. Personal data is identified and minimized to what is necessary. Lawful basis is documented per GDPR and CCPA. Subjects can request access, rectification, or erasure, and erasure triggers a documented model retraining assessment. Privacy-enhancing techniques (pseudonymization, differential privacy) limit re-identification risk. Cross-border transfers of training data are mapped to transfer mechanisms. A DPIA is on file. Every privacy-relevant event is logged in the audit trail.",
          failure: "Customer email content was used for training without documented lawful basis or minimization. A subject requests erasure. The model has memorized identifiable phrases and can be queried to reveal them. No DPIA exists. A regulator asks for records of processing activities, cross-border transfers, and consent withdrawals. There are none. The system is running, but it is non-compliant the moment anyone looks."
        }
      ]
    }
  },
  "implementation-guidance": {
    group: "The Framework", title: "Implementation Guidance", type: "comparison",
    data: {
      intro: "The ten requirements define what to verify. This section addresses how to calibrate verification for your system: what thresholds to set, what happens when you transform a model for deployment, and what controls apply when the model keeps learning.",
      tabs: ["Threshold Selection", "Deployment Validation", "Continuous Learning", "Tooling Integration"],
      content: [
        { title: "Threshold Selection", items: [
          { phase: "Bias Metrics (AI-2)", desc: "Demographic parity difference: 2% or less for Safety Critical, 5% or less for Mission Critical. Equalized odds difference: 3% or less TPR/FPR difference across groups. Tighter thresholds for crew health and safety functions." },
          { phase: "Drift Detection (AI-4)", desc: "Population Stability Index below 0.1 is negligible. Between 0.1 and 0.25 is moderate, triggering alerts. Above 0.25 is significant, halting autonomous operation for Safety Critical systems." },
          { phase: "Performance Degradation (AI-4)", desc: "5% or less accuracy drop from baseline. Baseline established during V&V. Consider mission phase sensitivity. Threshold values are documented and justified based on mission risk tolerance." },
          { phase: "Confidence Threshold (AI-8)", desc: "Expected Calibration Error of 0.05 or less. Reliability slope between 0.9 and 1.1. A stated 90% confidence should be correct approximately 90% of the time. Critical for operator trust calibration. Validate across operational scenarios, not just aggregate test data." },
          { phase: "OOD Detection (AI-6)", desc: "Detection rate of 97% or greater with a false positive rate of 2% or less. Validate against realistic out of distribution scenarios from the operational environment, not just synthetic noise. Balance detection sensitivity against operational false alarm burden." },
          { phase: "Project Responsibility", desc: "These are example ranges, not mandated values. Projects define and document their own thresholds with justification. The framework requires the thresholds to exist, be justified, and be monitored. The specific values are an engineering decision." }
        ], note: "Threshold values should be derived from mission risk tolerance. The framework requires thresholds, justification, and monitoring. It does not prescribe specific numbers." },
        { title: "Deployment Validation", items: [
          { phase: "Quantization", desc: "Reducing model precision from 32 bit floating point to 8 bit integer for edge deployment. The weights are mathematically different. Performance may degrade on edge cases that were within tolerance at full precision." },
          { phase: "Pruning", desc: "Removing model weights or layers to reduce size. Connections that contributed to correct predictions on rare cases may be the first to go. The pruned model may pass aggregate tests while failing on the cases that matter most." },
          { phase: "Knowledge Distillation", desc: "Training a smaller model to mimic the original. The student model approximates the teacher but is not the same model. Behaviors learned from rare training examples may not transfer." },
          { phase: "Format Conversion", desc: "Converting between frameworks: PyTorch to ONNX to TensorRT. Each conversion involves numerical transformations. Rounding behavior, operator differences, and optimization passes can all change outputs at the margins." }
        ], note: "Revalidation means side by side performance comparisons on representative test datasets. Degradation must be documented and accepted within defined margins." },
        { title: "Continuous Learning Controls", items: [
          { phase: "Safety Critical AI", desc: "Five controls required: rollback to last verified model, approval for updates prior to activation, shadow mode validation before operational use, automated performance bounds with automatic reversion, continuous validation per AI-4 with tightened thresholds." },
          { phase: "Mission Critical AI", desc: "Four controls required: performance monitoring per AI-4, automated rollback at defined thresholds, logging of all model updates, periodic review of learning trajectory." },
          { phase: "Operational Support AI", desc: "Two controls required: baseline performance tracking, anomaly alerting for significant behavior changes." },
          { phase: "Minimum Classification", desc: "Systems employing continuous learning are classified no lower than Mission Critical. A system whose behavior changes during operations without a code release requires at minimum the controls of Mission Critical classification." }
        ], note: "Controls are scaled by classification. A system that learns during operations is a system whose verified behavior can change. The controls ensure that change remains within acceptable bounds." },
        { title: "Tooling Integration", items: [
          { phase: "CI/CD Pipeline Integration", desc: "Drift detection (AI-4), bias monitoring (AI-2), and performance validation can be automated as pipeline stages alongside your existing build, test, and deploy steps. Model validation runs the same way unit tests run: automatically, on every change, with pass/fail gates." },
          { phase: "Model Registry and Versioning", desc: "Tools like MLflow, DVC, and Weights & Biases track model versions, training runs, and performance metrics the way Git tracks code. Model registry integration provides the artifact versioning that AI-1 and AI-4 require. Your existing version control workflow extends to model artifacts." },
          { phase: "Monitoring and Observability", desc: "AI-4 continuous validation and AI-6 out of distribution detection are monitoring problems. They integrate with existing observability infrastructure: Prometheus, Grafana, Datadog, or your current stack. Drift alerts fire the same way your existing system alerts fire. OOD flags route through existing incident management." },

function render() { renderSidebar(); renderContent(); updateCounter(); }

function renderSidebar() {
  let html = '';
  groups.forEach(group => {
    html += '<div class="nav-group"><div class="nav-group-header">' + group.label + '</div>';
    group.items.forEach(item => {
      const idx = flatSections.indexOf(item.id);
      html += '<button class="nav-btn ' + (idx === currentIndex ? 'active' : '') + '" onclick="goTo(' + idx + ')">' + item.title + '</button>';
    });
    html += '</div>';
  });
  document.getElementById('sidebar').innerHTML = html;
}

function renderContent() {
  const sectionId = flatSections[currentIndex];
  const section = sections[sectionId];
  let html = section.type === 'title' ? '' : '<div class="content-header"><div class="section-label">' + section.group + '</div><h2>' + section.title + '</h2></div>';
  html += renderSection(section);
  html += '<div class="nav-footer"><button ' + (currentIndex === 0 ? 'disabled' : '') + ' onclick="prev()">Previous</button><button class="' + (currentIndex === flatSections.length - 1 ? '' : 'primary') + '" ' + (currentIndex === flatSections.length - 1 ? 'disabled' : '') + ' onclick="next()">Next</button></div>';
  document.getElementById('content').innerHTML = html;
  
  // Initialize training canvas if on that step
  if (sectionId === 'why-different' && wtStep === 6) {
    initTrainCanvas();
  }
}

function renderSection(section) {
  switch(section.type) {
    case 'title': return renderTitle(section.data);
    case 'overview': return renderOverview(section.data);
    case 'ml-walkthrough': return renderMLWalkthrough(section.data);
    case 'concept': return renderConcept(section.data);
    case 'features': return renderFeatures(section.data);
    case 'envelope': return renderEnvelope(section.data);
    case 'comparison': return renderComparison(section.data);
    case 'table': return renderTable(section.data);
    case 'tiers': return renderTiers(section.data);
    case 'requirements': return renderRequirements(section.data);
    case 'requirements-tabs': return renderRequirementsTabs(section.data);
    case 'scenarios': return renderScenarios(section.data);
    case 'timeline': return renderTimeline(section.data);
    case 'process': return renderProcess(section.data);
    case 'outcomes': return renderOutcomes(section.data);
    case 'standard': return renderStandard(section.data);
    case 'contact': return renderContact(section.data);
    case 'ct-intro': return renderCTIntro(section.data);
    case 'ct-reqs': return renderCTReqs(section.data);
    case 'ct-dashboard': return renderCTEnvelopeBuilt(section.data);
    case 'vv-compare': return renderVVCompare(section.data);
    case 'readiness': return renderReadiness(section.data);
    default: return '';
  }
}

function renderVVCompare(data) {
  var item = data.content[activeTab];
  var html = '<p class="intro">' + data.intro + '</p>';

  // Tabs
  html += '<div class="tabs">';
  data.tabs.forEach(function(t, i) {
    html += '<button class="tab-btn ' + (i === activeTab ? 'active' : '') + '" onclick="setTab(' + i + ')">' + t + '</button>';
  });
  html += '</div>';

  // Two-column layout
  html += '<div class="wt-compare" style="margin-bottom:16px;">';

  // Traditional column
  html += '<div class="wt-compare-col trad">';
  html += '<div class="wt-compare-label">' + item.trad.label + '</div>';
  html += '<div style="font-size:13px;color:var(--ink);line-height:1.7;margin-top:10px;">' + item.trad.desc + '</div>';
  html += '</div>';

  // AI column
  html += '<div class="wt-compare-col ai">';
  html += '<div class="wt-compare-label">' + item.ai.label + '</div>';
  html += '<div style="font-size:13px;color:var(--ink);line-height:1.7;margin-top:10px;">' + item.ai.desc + '</div>';
  html += '</div>';

  html += '</div>';

  // Gap callout
  html += '<div class="wt-panel wt-panel-red">';
  html += '<div class="wt-panel-label">Where It Breaks</div>';
  html += '<div style="font-size:13px;color:var(--ink2);line-height:1.7;">' + item.gap + '</div>';
  html += '</div>';

  // Note
  if (item.note) {
    html += '<div class="tab-note">' + item.note + '</div>';
  }

  return html;
}

function renderOverview(data) {
  let html = '<div class="overview-grid">';
  html += '<div class="overview-body">' + data.body + '</div>';
  html += '<div>';
  html += '<div class="overview-stats">';
  data.stats.forEach(s => {
    html += '<div class="ostat"><div class="ostat-num">' + s.num + (s.unit ? '<em> ' + s.unit + '</em>' : '') + '</div><div class="ostat-label">' + s.label + '</div></div>';
  });
  html += '</div>';
  html += '<div class="overview-strip">';
  data.tags.forEach(t => {
    html += '<span class="overview-tag' + (t.accent ? ' accent' : '') + '">' + t.text + '</span>';
  });
  html += '</div>';
  html += '</div></div>';

  // Document outline
  if (data.outline) {
    html += '<div class="doc-outline">';
    html += '<div class="doc-outline-label">Document Structure</div>';
    html += '<div class="doc-outline-sections">';
    data.outline.forEach((sec, i) => {
      html += '<div class="doc-outline-item" id="outline-' + i + '">';
      html += '<div class="doc-outline-header" onclick="toggleOutline(' + i + ')">';
      html += '<span class="doc-outline-num">' + sec.num + '</span>';
      html += '<span class="doc-outline-title">' + sec.title + '</span>';
      if (sec.badge) html += '<span class="doc-outline-badge">' + sec.badge + '</span>';
      html += '<span class="doc-outline-chevron">&#9656;</span>';
      html += '</div>';
      html += '<div class="doc-outline-detail">';
      html += '<div class="doc-outline-desc">' + sec.desc + '</div>';
      if (sec.subs && sec.subs.length > 0) {
        html += '<div class="doc-outline-subs">';
        sec.subs.forEach((sub, j) => {
          if (typeof sub === 'string') {
            html += '<div class="doc-outline-sub">' + sub + '</div>';
          } else {
            html += '<div class="doc-outline-sub clickable" onclick="toggleSubSummary(this)">';
            html += '<div class="doc-outline-sub-text"><span class="doc-outline-sub-chevron">&#9656;</span>' + sub.text + '</div>';
            html += '<div class="doc-outline-sub-summary">' + sub.summary + '</div>';
            html += '</div>';
          }
        });
        html += '</div>';
      }
      html += '</div></div>';
    });
    html += '</div></div>';
  }

  return html;
}

function renderMLWalkthrough(data) {
  const steps = data.steps;
  let html = '<div class="wt-nav">';
  html += '<div class="wt-dots">';
  steps.forEach((s, i) => {
    const cls = i === wtStep ? 'active' : (i < wtStep ? 'done' : '');
    html += '<button class="wt-dot ' + cls + '" onclick="wtGoTo(' + i + ')"></button>';
  });
  html += '</div>';
  html += '<span class="wt-label">' + steps[wtStep] + '</span>';
  html += '<div class="wt-arrows">';
  html += '<button class="wt-arrow" ' + (wtStep === 0 ? 'disabled' : '') + ' onclick="wtPrev()">←</button>';
  html += '<button class="wt-arrow" ' + (wtStep === steps.length - 1 ? 'disabled' : '') + ' onclick="wtNext()">→</button>';
  html += '</div></div>';
  
  // Step content
  html += renderWTStep(wtStep);
  
  return html;
}

    case 1: return renderWTWhereIntentLives();
    case 2: return renderWTData();
    case 3: return renderWTTokens();
    case 4: return renderWTEmbedding();
    case 5: return renderWTLoss();
    case 6: return renderWTTraining();
    case 7: return renderWTResult();
    case 8: return renderWTVerification();
    case 9: return renderWTCertGap();
    default: return '';
  }
}

function renderWTWhereIntentLives() {
  return '<div class="wt-step active">' +
    '<div class="wt-title">Where intent lives</div>' +
    '<div class="wt-text">In traditional software, the developer\'s intent goes directly into the code. Every decision is written down. In AI, the developer\'s intent goes into the loss function. The decision logic is left to training.</div>' +
    '<div class="wt-compare">' +
      '<div class="wt-compare-col trad">' +
        '<div class="wt-compare-label">Traditional: Intent is in the Code</div>' +
        '<div style="font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--ink);background:var(--bg);padding:12px;border-radius:4px;margin-top:8px;">' +
          '<span style="color:var(--ink3)"># Developer\'s intent: flag emails</span><br>' +
          '<span style="color:var(--ink3)"># with financial spam words</span><br><br>' +
          '<span style="color:var(--green)">if</span> <span style="color:#6B4E0A">"MONEY"</span> <span style="color:var(--green)">in</span> subject:<br>' +
          '&nbsp;&nbsp;<span style="color:var(--green)">return</span> SPAM<br><br>' +
          '<span style="color:var(--green)">if</span> <span style="color:#6B4E0A">"CASH"</span> <span style="color:var(--green)">in</span> subject:<br>' +
          '&nbsp;&nbsp;<span style="color:var(--green)">return</span> SPAM' +
        '</div>' +
        '<div style="font-size:12px;color:var(--ink2);margin-top:10px;">The developer thought "MONEY means spam" and wrote exactly that. A reviewer can read this code and see the intent. <strong>The artifact IS the intent.</strong></div>' +
      '</div>' +
      '<div class="wt-compare-col ai">' +
        '<div class="wt-compare-label">AI: Intent is in the Loss Function</div>' +
        '<div style="padding:16px;background:var(--bg);border-radius:4px;margin-top:8px;">' +
          '<div style="font-size:13px;color:var(--ink);line-height:1.8;">' +
            'Here are 10,000 emails.<br>' +
            'I labeled each one: spam or not spam.<br>' +
            'Learn to predict the label correctly.<br>' +
            'Get better with each pass.' +
          '</div>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--ink2);margin-top:10px;">The developer thought "MONEY means spam" but <strong>never wrote that down.</strong> They wrote "get better at guessing." That knowledge is buried in the labels, scattered across 10,000 examples. The system has to figure it out.</div>' +
      '</div>' +
    '</div>' +
    '<div class="wt-panel" style="margin-top:16px;">' +
      '<div class="wt-panel-label">What is a loss function?</div>' +
      '<div class="wt-text">A loss function is a single number that tells the system how wrong its last guess was. <strong>A big number means very wrong. A small number means close to right.</strong> It is the only feedback the system ever receives during training.</div>' +

      '<div class="wt-text">Think of the children\'s game of hot and cold. One person hides an object. The other walks around searching. The only allowed feedback is "warmer" or "colder." No one ever says <em>"turn left, then take three steps, then look under the chair."</em> Over many guesses, the searcher finds the object. But the path they take, and the strategy they develop, is entirely their own. <strong>A loss function is "warmer or colder" for a machine.</strong></div>' +

      // Concrete worked example
      '<div style="background:var(--bg);border-radius:4px;padding:16px;margin-bottom:14px;border:1px solid var(--rule);">' +
        '<div style="font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;">A worked example: one email at a time</div>' +
        '<div style="display:grid;grid-template-columns:1.1fr 1.4fr 1.3fr;gap:10px;align-items:center;font-size:12px;line-height:1.4;">' +
          '<div style="font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);padding-bottom:8px;border-bottom:1px solid var(--rule);">True label</div>' +
          '<div style="font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);padding-bottom:8px;border-bottom:1px solid var(--rule);">System\'s guess</div>' +
          '<div style="font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);padding-bottom:8px;border-bottom:1px solid var(--rule);text-align:right;">Loss (how wrong)</div>' +

          '<div style="color:var(--ink);font-weight:500;">Spam</div>' +
          '<div style="color:var(--ink);">Not spam, very confident</div>' +
          '<div style="text-align:right;font-family:var(--mono);font-size:13px;color:var(--red);font-weight:600;">4.61 <span style="font-family:var(--sans);font-size:11px;font-weight:400;color:var(--ink3);margin-left:4px;">very wrong</span></div>' +

          '<div style="color:var(--ink);font-weight:500;">Spam</div>' +
          '<div style="color:var(--ink);">Maybe spam? 60% sure</div>' +
          '<div style="text-align:right;font-family:var(--mono);font-size:13px;color:var(--gold);font-weight:600;">0.51 <span style="font-family:var(--sans);font-size:11px;font-weight:400;color:var(--ink3);margin-left:4px;">still learning</span></div>' +

          '<div style="color:var(--ink);font-weight:500;">Spam</div>' +
          '<div style="color:var(--ink);">Spam, 99% sure</div>' +
          '<div style="text-align:right;font-family:var(--mono);font-size:13px;color:var(--green);font-weight:600;">0.01 <span style="font-family:var(--sans);font-size:11px;font-weight:400;color:var(--ink3);margin-left:4px;">nearly right</span></div>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--ink2);margin-top:14px;padding-top:12px;border-top:1px solid var(--rule);line-height:1.6;">The system computes that loss number for every one of the 10,000 emails, averages them, and then adjusts millions of internal parameters to make the average a little smaller on the next pass. Then it does it again. And again. <strong>That repeated adjustment process is what "training" actually is.</strong></div>' +
      '</div>' +

      // What was written vs not written
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">' +
        '<div style="padding:12px 14px;background:var(--green-lt);border-left:3px solid var(--green);border-radius:0 4px 4px 0;">' +
          '<div style="font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--green);margin-bottom:6px;">What the developer wrote</div>' +
          '<div style="font-size:12px;color:var(--ink);line-height:1.5;">A scoring rule: "warmer or colder" as a number.</div>' +
        '</div>' +
        '<div style="padding:12px 14px;background:var(--red-lt);border-left:3px solid var(--red);border-radius:0 4px 4px 0;">' +
          '<div style="font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--red);margin-bottom:6px;">What the developer did NOT write</div>' +
          '<div style="font-size:12px;color:var(--ink);line-height:1.5;">Any rule about subject lines, keywords, senders, or spam patterns.</div>' +
        '</div>' +
      '</div>' +

      '<div class="wt-text" style="margin-bottom:0;">That is the principle. <strong>The developer defines what wrong means, not what right looks like.</strong> The system discovers "right" on its own through training. The recipe it discovers lives in those millions of adjusted parameters, not in anything a person wrote down.</div>' +
    '</div>' +
    '<div class="wt-callout"><p>A V&V engineer verifying traditional software reads the code and traces it to requirements. That process assumes the developer\'s intent is readable in the artifact. What happens when it is not? <strong>The next six steps show where the intent goes in an AI system, and why it cannot be read back out.</strong></p></div>' +
  '</div>';
}
