function renderWTTokens() {
  return '<div class="wt-step active">' +
    '<div class="wt-title">Processing the input</div>' +

    // What is tokenization? — explainer panel for an audience hearing this word for the first time
    '<div class="wt-panel" style="margin-bottom:16px;">' +
      '<div class="wt-panel-label">What is tokenization?</div>' +
      '<div class="wt-text">A computer does not read a sentence the way you do. Before it can work with text at all, the text has to be broken into small, consistent pieces. <strong>Those pieces are called tokens. The chopping process is called tokenization.</strong></div>' +

      // Visual: text → tokens
      '<div style="background:var(--bg);border-radius:4px;padding:18px;border:1px solid var(--rule);margin-bottom:14px;">' +
        '<div style="text-align:center;margin-bottom:8px;">' +
          '<div style="font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;">What you typed</div>' +
          '<div style="font-size:15px;color:var(--ink);font-weight:500;">Send MONEY now!</div>' +
        '</div>' +
        '<div style="text-align:center;color:var(--ink3);font-size:18px;margin:4px 0;">↓</div>' +
        '<div style="text-align:center;">' +
          '<div style="font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;">What the tokenizer produces</div>' +
          '<div class="wt-tokens" style="justify-content:center;">' +
            '<span class="wt-token">Send</span>' +
            '<span class="wt-token">MONEY</span>' +
            '<span class="wt-token">now</span>' +
            '<span class="wt-token">!</span>' +
          '</div>' +
        '</div>' +
      '</div>' +

      // Two facts that usually surprise people
      '<div class="wt-text">Two things usually surprise people about this step. <strong>First, tokens are not always whole words.</strong> Common words get their own token, but rare or long words get broken into pieces. "Unbelievable" might become three tokens: <span style="font-family:var(--mono);background:var(--bg);padding:1px 5px;border:1px solid var(--rule);border-radius:3px;font-size:11px;">un</span> + <span style="font-family:var(--mono);background:var(--bg);padding:1px 5px;border:1px solid var(--rule);border-radius:3px;font-size:11px;">believ</span> + <span style="font-family:var(--mono);background:var(--bg);padding:1px 5px;border:1px solid var(--rule);border-radius:3px;font-size:11px;">able</span>. Punctuation marks, emojis, and even spaces can each be their own token.</div>' +
      '<div class="wt-text" style="margin-bottom:0;"><strong>Second, once text is tokenized, these pieces are all the system ever works with.</strong> Not your original sentence, not characters, not anything you typed. Only this sliced list. Every step that follows operates on the output of this step: the comparison to known words, the learning, and the final decision. <strong>If the tokenizer cuts differently, the system receives a different input, even if the text looked identical to a person.</strong></div>' +
    '</div>' +

    '<div class="wt-compare">' +
      '<div class="wt-compare-col trad">' +
        '<div class="wt-compare-label">Traditional: String Matching</div>' +
        '<div style="padding:14px;background:var(--bg);border-radius:4px;margin-top:8px;">' +
          '<div style="font-size:13px;color:var(--ink);margin-bottom:8px;">Input: "Send MONEY now"</div>' +
          '<div style="font-family:var(--mono);font-size:11px;color:var(--ink2);line-height:1.7;">' +
            'subject.contains(<span style="color:var(--green)">"MONEY"</span>) → <span style="color:var(--green)">TRUE</span>' +
          '</div>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--ink2);margin-top:10px;">Direct string comparison. MONEY is checked as literal text.</div>' +
      '</div>' +
      '<div class="wt-compare-col ai">' +
        '<div class="wt-compare-label">AI: Tokenization</div>' +
        '<div style="padding:14px;background:var(--bg);border-radius:4px;margin-top:8px;text-align:center;">' +
          '<div style="font-size:13px;color:var(--ink);margin-bottom:8px;">Input: "Send MONEY now to claim your prize!"</div>' +
          '<div class="wt-arrow-down">↓</div>' +
          '<div class="wt-tokens" style="justify-content:center;"><span class="wt-token">Send</span><span class="wt-token hl">MONEY</span><span class="wt-token">now</span><span class="wt-token">to</span><span class="wt-token">claim</span><span class="wt-token">your</span><span class="wt-token">prize</span><span class="wt-token">!</span></div>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--ink2);margin-top:10px;">Text split into tokens. MONEY is still a recognizable string at this stage.</div>' +
      '</div>' +
    '</div>' +
    '<div class="wt-text" style="margin-top:16px;">At this point, both approaches still have MONEY as a readable string. A V&V engineer could still find the word. <strong>The divergence happens next, and it is where your ability to read the artifact ends.</strong></div>' +

        '<div class="tok-output" id="tok-output"><div style="font-size:12px;color:var(--ink3);">Type something above to see it tokenized.</div></div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// Training animation
function initTrainCanvas() {
  const canvas = document.getElementById('train-canvas');
  if (!canvas) return;
  
  // Create dots at starting positions
  wordData.forEach(w => {
    const dot = document.createElement('div');
    dot.className = 'wt-train-dot ' + w.type;
    dot.id = 'dot-' + w.word;
    dot.setAttribute('data-word', w.word);
    dot.style.left = w.start.x + '%';
    dot.style.top = w.start.y + '%';
    canvas.appendChild(dot);
  });
  
  // Add cluster circle (hidden initially)
  const cluster = document.createElement('div');
  cluster.className = 'wt-train-cluster';
  cluster.id = 'train-cluster';
  cluster.style.left = '50%';
  cluster.style.top = '8%';
  cluster.style.width = '0px';
  cluster.style.height = '0px';
  cluster.style.opacity = '0';
  canvas.appendChild(cluster);
}

function runTraining() {
  const btn = document.getElementById('train-btn');
  if (trainInterval) return;
  btn.disabled = true;
  btn.textContent = 'Training...';
  
  trainEpoch = 0;
  const maxEpochs = 100;
  
  trainInterval = setInterval(() => {
    trainEpoch += 5;
    const progress = Math.min(trainEpoch / maxEpochs, 1);
    
    // Move dots
    wordData.forEach(w => {
      const dot = document.getElementById('dot-' + w.word);
      if (dot) {
        const x = w.start.x + (w.end.x - w.start.x) * progress;
        const y = w.start.y + (w.end.y - w.start.y) * progress;
        dot.style.left = x + '%';
        dot.style.top = y + '%';
      }
    });
    
    // Show cluster
    const cluster = document.getElementById('train-cluster');
    if (cluster) {
      cluster.style.width = (140 * progress) + 'px';
      cluster.style.height = (110 * progress) + 'px';
      cluster.style.opacity = progress * 0.5;
    }
    
    // Update displays
    document.getElementById('train-epoch').textContent = 'Epoch: ' + trainEpoch;
    const loss = (1 - progress * 0.85).toFixed(3);
    document.getElementById('train-loss').innerHTML = 'Loss: <span>' + loss + '</span>';
    
    if (trainEpoch >= maxEpochs) {
      clearInterval(trainInterval);
      trainInterval = null;
      btn.textContent = 'Training Complete';
      document.getElementById('train-explain').innerHTML = '<strong>Training complete.</strong> MONEY, CASH, FUNDS, and DOLLARS have clustered together. They now occupy similar regions of embedding space. The model learned this structure from context alone.';
    }
  }, 100);
}

let searchIdx = 0;
let searchInterval = null;
function searchForMoney() {
  const weights = document.querySelectorAll('#search-weights span');
  const result = document.getElementById('search-result');
  if (searchInterval) return;
  
  result.textContent = 'Searching...';
  result.className = 'wt-search-result';
  searchIdx = 0;
  
  searchInterval = setInterval(() => {
    weights.forEach((w, i) => w.classList.toggle('hl', i === searchIdx));
    searchIdx++;
    if (searchIdx >= weights.length - 1) {
      clearInterval(searchInterval);
      searchInterval = null;
      weights.forEach(w => w.classList.remove('hl'));
      result.innerHTML = '<strong>Not found.</strong> The word MONEY does not exist in the model. Only coordinates remain. The intent dissolved into geometry.';
      result.className = 'wt-search-result fail';
    }
  }, 80);
}

  labelPicks[idx] = pick;
  labelCount++;
  
  const el = document.getElementById('le-' + idx);
  const btns = el.querySelectorAll('.label-btn');
  btns.forEach(b => { b.disabled = true; });
  if (pick === 'spam') btns[0].classList.add('picked-spam');
  else btns[1].classList.add('picked-ham');
  
  if (labelCount === 5) revealLabels();
}

function revealLabels() {
  let matches = 0;
  for (let i = 0; i < 5; i++) {
    const el = document.getElementById('le-' + i);
    const a = labelAnswers[i];
    const agreed = labelPicks[i] === a.answer;
    if (agreed) matches++;
    
    el.classList.add(a.answer === 'spam' ? 'revealed-spam' : 'revealed-ham');
    
    const result = document.createElement('div');
    result.className = 'label-result ' + (agreed ? 'match' : 'mismatch');
    result.innerHTML = agreed
      ? '✓ You agreed with the training set. ' + a.reason
      : '✗ You labeled ' + labelPicks[i] + '. Training set says ' + a.answer + '. ' + a.reason;
    el.appendChild(result);
  }
  
  const score = document.getElementById('label-score');
  score.style.display = 'block';
  if (matches === 5) {
    score.style.background = 'var(--green-lt)';
    score.innerHTML = '<strong>5/5 agreement.</strong> Your labels matched the training set. But another person might have labeled #2 or #5 differently. The model would learn a different boundary from different labels.';
  } else {
    score.style.background = 'var(--red-lt)';
    score.innerHTML = '<strong>' + matches + '/5 agreement.</strong> You and the training set disagreed on ' + (5 - matches) + '. This is the point: the model learns from these labels, including the ambiguous ones. Different labels, different model. <strong>The developer\'s judgment is baked into the data, not the code.</strong>';
  }
  
  const callout = document.getElementById('label-callout');
  if (callout) {
    callout.innerHTML = '<p><strong>You just did what the AI developer does.</strong> Every label is a judgment call. The model learns from those judgments, including the close calls. No rule was written. The intent lives in the labels.</p>';
  }
}

// Interactive: Live Tokenizer
const spamWords = ['money','cash','free','urgent','funds','prize','claim','reward','dollars','win','congratulations','offer','act','winner','lottery'];

function tokenizeInput() {
  const input = document.getElementById('tok-input');
  const output = document.getElementById('tok-output');
  const text = input.value.trim();
  
  if (!text) {
    output.innerHTML = '<div style="font-size:12px;color:var(--ink3);">Type something above to see it tokenized.</div>';
    return;
  }
  
  // Simple whitespace + punctuation tokenization
  const tokens = text.match(/[\w]+|[^\s\w]/g) || [];
  let html = '<div class="wt-tokens">';
  tokens.forEach(t => {
    const isSpam = spamWords.includes(t.toLowerCase());
    html += '<span class="wt-token' + (isSpam ? ' spam-word' : '') + '">' + t + '</span>';
  });
  html += '</div>';
  
  const spamFound = tokens.filter(t => spamWords.includes(t.toLowerCase()));
  if (spamFound.length > 0) {
    html += '<div style="font-size:11px;color:var(--red);margin-top:8px;font-family:var(--mono);">' + spamFound.length + ' token' + (spamFound.length > 1 ? 's' : '') + ' associated with spam patterns highlighted.</div>';
  }
  
  output.innerHTML = html;
}

function cosineSim(a, b) {
  let dot = 0, magA = 0, magB = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    magA += a[i] * a[i];
    magB += b[i] * b[i];
  }
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

let driftInterval = null;
const driftData = [94, 93.2, 91.8, 90.1, 88.0, 86.2, 84.1, 81.5, 79.3, 78.0, 76.2, 73.8];
const driftMonths = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function driftAccToY(acc) {
  // Map 96% → y=14, 75% → y=150
  return 14 + (96 - acc) / (96 - 75) * (150 - 14);
}

function runDrift() {
  const btn = document.getElementById('drift-btn');
  if (driftInterval) return;
  btn.disabled = true;
  btn.textContent = 'Monitoring...';
  
  let step = 0;
  const line = document.getElementById('drift-line');
  const area = document.getElementById('drift-area');
  const dot = document.getElementById('drift-dot');
  const alertDot = document.getElementById('drift-alert-dot');
  const readout = document.getElementById('drift-readout');
  const monthEl = document.getElementById('drift-month');
  const alertEl = document.getElementById('drift-alert');
  let points = [];
  let alertFired = false;
  
  driftInterval = setInterval(function() {
    if (step >= driftData.length) {
      clearInterval(driftInterval);
      driftInterval = null;
      btn.textContent = 'Monitoring Complete';
      return;
    }
    
    var acc = driftData[step];
    var x = 40 + step * 34;
    var y = driftAccToY(acc);
    points.push(x + ',' + y);
    
    line.setAttribute('points', points.join(' '));
    
    // Fill area path
    var areaD = 'M' + (40 + 0 * 34) + ',158';
    for (var i = 0; i < points.length; i++) { areaD += ' L' + points[i]; }
    areaD += ' L' + x + ',158 Z';
    area.setAttribute('d', areaD);
    
    // Move tracking dot
    dot.setAttribute('cx', x);
    dot.setAttribute('cy', y);
    dot.setAttribute('opacity', '1');
    
    // Update readout
    var isOk = acc >= 85;
    readout.innerHTML = 'Accuracy: <span class="' + (isOk ? 'ok' : 'warn') + '">' + acc.toFixed(1) + '%</span>';
    monthEl.innerHTML = 'Month: <span>' + driftMonths[step] + '</span>';
    
    // Color the dot based on threshold
    dot.setAttribute('fill', isOk ? '#0F2340' : '#2B6CB0');
    
    // Fire alert when crossing threshold
    if (!alertFired && acc < 85) {
      alertFired = true;
      alertDot.setAttribute('cx', x);
      alertDot.setAttribute('cy', y);
      alertDot.setAttribute('opacity', '1');
      alertDot.setAttribute('r', '0');
      // Pulse animation via JS
      var pulseR = 0;
      var pulseInt = setInterval(function() {
        pulseR += 1.5;
        alertDot.setAttribute('r', pulseR);
        alertDot.setAttribute('opacity', Math.max(0, 1 - pulseR / 20));
        if (pulseR >= 20) {
          clearInterval(pulseInt);
          alertDot.setAttribute('r', '6');
          alertDot.setAttribute('opacity', '1');
        }
      }, 30);
      alertEl.classList.add('visible');
      // Change line color to red from here on
      line.setAttribute('stroke', '#2B6CB0');
    }
    
    step++;
  }, 500);
}

// Coverage test interactive
var covTestedPatterns = ['MONEY', 'CASH', 'FUNDS', 'DOLLARS', 'FREE', 'PRIZE'];
var covMissCount = 0;
var covHitCount = 0;

function setCovInput(val) {
  document.getElementById('cov-input').value = val;
  runCoverageTest();
}

function runCoverageTest() {
  var input = document.getElementById('cov-input').value.trim().toUpperCase();
  var result = document.getElementById('cov-result');
  var tally = document.getElementById('cov-tally');
  if (!input) return;
  
  result.style.display = 'block';
  
  if (covTestedPatterns.indexOf(input) !== -1) {
    covHitCount++;
    result.style.background = 'var(--green-lt)';
    result.style.border = '1px solid rgba(45,122,58,0.2)';
    result.style.color = 'var(--green)';
    result.innerHTML = '✓ CAUGHT. "' + input + '" is in the test suite.';
  } else {
    covMissCount++;
    result.style.background = 'var(--red-lt)';
    result.style.border = '1px solid rgba(43,108,176,0.2)';
    result.style.color = 'var(--red)';
    result.innerHTML = '✗ MISSED. "' + input + '" is not in the test suite. This variant reaches the inbox.';
  }
  
  if (covMissCount > 0) {
    tally.innerHTML = '<span style="color:var(--red);font-weight:500;">' + covMissCount + ' untested variant' + (covMissCount > 1 ? 's' : '') + ' found.</span> Your test suite covers the patterns you thought of. It does not cover the patterns attackers think of.';
    tally.style.background = 'var(--red-lt)';
    tally.style.color = 'var(--ink2)';
  }
}

  labelPicks = [null, null, null, null, null];

  embedSelections = [null, null];

}

function renderComparison(data) {
  const tab = data.content[activeTab];
  let html = '<p class="intro">' + data.intro + '</p><div class="tabs">';
  data.tabs.forEach((t, i) => { html += '<button class="tab-btn ' + (i === activeTab ? 'active' : '') + '" onclick="setTab(' + i + ');compRevealStep=0;render();">' + t + '</button>'; });
  html += '</div>';
  
  html += '<div class="tab-content"><h4>' + tab.title + '</h4>';
  
  // Gauges (only if metrics exist)
  const hasMetrics = tab.items && tab.items[0] && tab.items[0].metrics;
  if (hasMetrics) {
    const showSecondGauge = activeTab === 1;
    const currentMetrics = tab.items[Math.min(compRevealStep, tab.items.length - 1)].metrics;
    const accColor = currentMetrics.accuracy >= 90 ? '#2D7A3A' : currentMetrics.accuracy >= 75 ? '#C8861A' : '#C8272D';
    
    html += '<div class="comp-gauge-wrap">';
    html += '<div class="comp-gauge">';
    html += '<div class="comp-gauge-label">' + tab.gaugeLabels[0] + '</div>';
    html += '<div class="comp-gauge-value" style="color:' + accColor + '">' + currentMetrics.accuracy + '<span>%</span></div>';
    html += '<div class="comp-gauge-bar"><div class="comp-gauge-fill" style="width:' + currentMetrics.accuracy + '%;background:' + accColor + '"></div></div>';
    html += '</div>';
    
    if (showSecondGauge) {
      const blkColor = currentMetrics.blocked === 0 ? '#2D7A3A' : currentMetrics.blocked < 20 ? '#C8861A' : '#C8272D';
      html += '<div class="comp-gauge">';
      html += '<div class="comp-gauge-label">' + tab.gaugeLabels[1] + '</div>';
      html += '<div class="comp-gauge-value" style="color:' + blkColor + '">' + currentMetrics.blocked + '<span>%</span></div>';
      html += '<div class="comp-gauge-bar"><div class="comp-gauge-fill" style="width:' + currentMetrics.blocked + '%;background:' + blkColor + '"></div></div>';
      html += '</div>';
    }
    html += '</div>';
  }
  
  // Timeline
  html += '<div class="comp-timeline">';
  tab.items.forEach((item, i) => {
    if (hasMetrics) {
      const revealed = i <= compRevealStep;
      html += '<div class="comp-phase' + (revealed ? ' revealed' : '') + '">';
      html += '<div class="comp-phase-marker status-' + item.status + '">' + item.icon + '</div>';
      html += '<div class="comp-phase-body">';
      html += '<div class="comp-phase-name">' + item.phase + '</div>';
      html += '<div class="comp-phase-desc">' + item.desc + '</div>';
      html += '</div></div>';
    } else {
      html += '<div class="comp-phase revealed">';
      html += '<div class="comp-phase-body">';
      html += '<div class="comp-phase-name">' + item.phase + '</div>';
      html += '<div class="comp-phase-desc">' + item.desc + '</div>';
      html += '</div></div>';
    }
  });
  html += '</div>';
  
  // Deeper question breakout (only if exists)
  if (tab.deeper) {
    const deeperRevealed = compRevealStep >= tab.items.length;
    html += '<div class="comp-deeper' + (deeperRevealed ? ' revealed' : '') + '">';
    html += '<div class="comp-deeper-label">The Deeper Question</div>';
    html += '<div class="comp-deeper-text">' + tab.deeper + '</div>';
    html += '</div>';
  }
  
  // Step button (only if metrics/timeline mode)
  if (hasMetrics) {
    const maxSteps = tab.items.length;
    if (compRevealStep <= maxSteps) {
      const btnLabel = compRevealStep < tab.items.length ? 'Next: ' + (compRevealStep < tab.items.length - 1 ? tab.items[compRevealStep + 1].phase : 'The Deeper Question') : '';
      if (compRevealStep === 0) {
        html += '<button class="comp-step-btn" onclick="advanceComp()">Step through the story &#9656;</button>';
      } else if (compRevealStep <= maxSteps - 1) {
        html += '<button class="comp-step-btn" onclick="advanceComp()">' + btnLabel + ' &#9656;</button>';
      }
    }
  }
  
  // Note
  const deeperRevealed = !tab.deeper || compRevealStep >= tab.items.length;
  if (deeperRevealed && tab.note) html += '<div class="tab-note">' + tab.note + '</div>';
  
  html += '</div>';
  return html;
}

var compRevealStep = 0;
function advanceComp() {
  const tab = sections['two-paths'];
  const maxSteps = tab.data.content[activeTab].items.length;
  if (compRevealStep <= maxSteps) {
    compRevealStep++;
    renderContent();
  }
}

function setReq(i) { activeReq = i; renderContent(); }

function renderScenarios(data) {
  const s = data.scenarios[activeScenario];
  let html = '<p class="intro">' + data.intro + '</p><div class="scenario-tabs">';
  data.scenarios.forEach((sc, i) => { html += '<button class="scenario-tab ' + (i === activeScenario ? 'active' : '') + '" onclick="setScenario(' + i + ')">' + sc.id + '</button>'; });
  html += '</div><div class="scenario-header"><h4>' + s.title + '</h4></div><div class="scenario-cols"><div class="scenario-col bad"><div class="label">WITHOUT ' + s.id + '</div><p>' + s.without + '</p></div><div class="scenario-col good"><div class="label">WITH ' + s.id + '</div><p>' + s.with + '</p></div></div>';
  return html;
}

function renderTimeline(data) {
  let html = '<p class="intro">' + data.intro + '</p><div class="timeline">';
  data.phases.forEach((p, i) => {
    html += '<div class="timeline-item ' + (p.active ? 'active' : '') + '"><div class="timeline-num">' + (i + 1) + '</div><div class="timeline-content"><div class="title">' + p.name + '</div><p>' + p.desc + '</p></div></div>';
  });
  html += '</div>';
  if (data.callout) html += '<div class="callout"><p>' + data.callout + '</p></div>';
  return html;
}

function renderProcess(data) {
  let html = '<p class="intro">' + data.intro + '</p><div class="process-steps">';
  data.steps.forEach((s, i) => {
    html += '<button class="process-step ' + (expandedStep === i ? 'expanded' : '') + '" onclick="toggleStep(' + i + ')"><div class="process-step-header"><span class="title">' + s.title + '</span><span class="stat">' + s.stat + '</span></div><div class="detail">' + s.detail + '</div></button>';
  });
  html += '</div>';
  return html;
}

function renderOutcomes(data) {
  let html = '<p class="intro">' + data.intro + '</p><div class="outcomes">';
  data.outcomes.forEach(o => {
    html += '<div class="outcome" data-color="' + o.color + '"><div class="label">' + o.name + '</div><div class="name">' + o.desc + '</div><p class="desc">' + o.details + '</p></div>';
  });
  html += '</div>';
  return html;
}

function renderTitle(data) {
  let html = '<div class="title-slide">';
  if (data.eyebrow) html += '<div class="title-eyebrow">' + data.eyebrow + '</div>';
  html += '<h1 class="title-heading">' + data.heading + '</h1>';
  if (data.subheading) html += '<p class="title-subheading">' + data.subheading + '</p>';
  if (data.meta && data.meta.length) {
    html += '<div class="title-meta">';
    data.meta.forEach(m => {
      html += '<div class="title-meta-item">' + m.label + '<strong>' + m.value + '</strong></div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderStandard(data) {
  let html = '<div class="doi-block"><div><div class="doi-label">Canonical DOI</div><div class="doi-value">' + data.doi + '</div><div class="doi-title">' + data.title + '</div><div class="doi-meta">' + data.publisher + ' · ' + data.license + '</div></div><a href="https://doi.org/' + data.doi + '" target="_blank" class="doi-btn">Download Framework</a></div><div class="features">';
  data.points.forEach(p => { html += '<div class="feature"><div class="title">' + p.title + '</div><p>' + p.desc + '</p></div>'; });
  html += '</div>';

  html += '<span class="crew-req-tag">AI-8 Explainability</span>';
  html += '<span class="crew-req-tag">AI-8.3 Confidence</span>';
  html += '<span class="crew-req-tag">AI-9 Human Authority</span>';
  html += '<span class="crew-req-tag">AI-9.5 Interaction Logging</span>';
  html += '</div>';
  
  html += '</div>';
  
  // Trigger button
  html += '<div class="crew-trigger-wrap">';
  if (ctScenario === 0) {
    html += '<button class="crew-trigger-btn" onclick="advanceCTScenario()">Trigger Alert Scenario</button>';
  } else if (ctScenario === 1) {
    html += '<button class="crew-trigger-btn" onclick="advanceCTScenario()">Show Commander Options</button>';
  } else if (ctScenario === 2) {
    html += '<button class="crew-trigger-btn" onclick="advanceCTScenario()">Commander Overrides</button>';
  } else {
    html += '<button class="crew-trigger-btn" disabled>Scenario Complete</button>';
  }
  html += '</div>';
  
  html += '</div>';
  return html;
}

function advanceCTScenario() {
  ctScenario++;
  renderContent();
}

function ctAction(type) {
  if (type === 'override') {
    var el = document.getElementById('ct-override');
    if (el) el.classList.toggle('visible');
  }
}

function renderCTReqs(data) {
  var req = data.reqs[activeCTReq];
  var html = '<p class="intro">' + data.intro + '</p>';
  // Tabs
  html += '<div class="ct-req-tabs">';
  data.reqs.forEach(function(r, i) {
    html += '<button class="ct-req-tab ' + (i === activeCTReq ? 'active' : '') + '" onclick="setCtReq(' + i + ')">' + r.id + '</button>';
  });
  html += '</div>';
  // Detail
  html += '<div class="ct-req-detail">';
  html += '<div class="ct-req-header"><span class="ct-req-id">' + req.id + '</span><span class="ct-req-name">' + req.name + '</span></div>';
  html += '<div class="ct-req-body">';
  // Challenge
  html += '<div class="ct-req-section"><div class="ct-req-section-label">The Challenge</div>';
  html += '<div class="ct-challenge">' + req.challenge + '</div></div>';
  // Question
  html += '<div class="ct-req-section"><div class="ct-req-section-label">The Question</div>';
  html += '<div class="ct-question">' + req.question + '</div></div>';
  // Connects back
  html += '<div class="ct-req-section"><div class="ct-req-section-label">Connection to Foundation</div>';
  html += '<div class="ct-connects">' + req.connects + '</div></div>';
  html += '</div></div>';
  return html;
}

function renderContact(data) {
  let html = '<div class="contact-grid"><div class="contact-left"><h2>AI certification for systems that <em>cannot fail.</em></h2><p>' + data.message + '</p></div><div class="contact-right">';
  data.links.forEach(l => {
    html += '<div class="contact-item"><div class="label">' + l.label + '</div>' + (l.href ? '<a href="' + l.href + '">' + l.value + '</a>' : '<span class="meta">' + l.value + '</span>') + '</div>';
  });
  html += '</div></div>';
  return html;
}

function updateCounter() {
  document.getElementById('counter').textContent = (currentIndex + 1) + '/' + flatSections.length;
}

function goTo(i) {
  currentIndex = i;
  expandedReq = null;
  expandedStep = null;
  activeTab = 0;
  activeScenario = 0;
  activeReq = 0;
  activeCTReq = 0;
  wtStep = 0;
  trainEpoch = 0;
  covMissCount = 0;
  covHitCount = 0;
  advState = false;
  partitionState = 0;
  compRevealStep = 0;
  ctScenario = 0;
  ctWtStep = 0;
  if (trainInterval) { clearInterval(trainInterval); trainInterval = null; }
  if (searchInterval) { clearInterval(searchInterval); searchInterval = null; }
  if (driftInterval) { clearInterval(driftInterval); driftInterval = null; }
  render();
}

function prev() { if (currentIndex > 0) goTo(currentIndex - 1); }
function next() { if (currentIndex < flatSections.length - 1) goTo(currentIndex + 1); }

function setTab(i) { activeTab = i; renderContent(); }
function setScenario(i) { activeScenario = i; renderContent(); }
function toggleReq(i) { expandedReq = expandedReq === i ? null : i; renderContent(); }
function renderReadiness(data) {
  let html = '<p class="intro">' + data.intro + '</p>';
  
  // 4-step flow
  html += '<div class="ra-flow">';
  data.steps.forEach((s, i) => {
    html += '<div class="ra-step">';
    html += '<div class="ra-step-num">STEP ' + s.num + '</div>';
    html += '<div class="ra-step-title">' + s.title + '</div>';
    html += '<div class="ra-step-desc">' + s.desc + '</div>';
    html += '<div class="ra-step-reqs">' + s.reqs + '</div>';
    if (i < data.steps.length - 1) html += '<div class="ra-step-arrow">&#9656;</div>';
    html += '</div>';
  });
  html += '</div>';
  
  // Output preview
  html += '<div class="ra-output">';
  html += '<div class="ra-output-label">Sample Output: Readiness Report</div>';
  html += '<div class="ra-report">';
  html += '<div class="ra-report-grid">';
  
  var sampleReqs = [
    { id: 'AI-1', name: 'Operational and Data Foundations', status: 'strong', label: 'Strong' },
    { id: 'AI-2', name: 'Addressing AI Bias', status: 'partial', label: 'Partial' },
    { id: 'AI-3', name: 'ML Test Coverage', status: 'strong', label: 'Strong' },
    { id: 'AI-4', name: 'Continuous Validation', status: 'partial', label: 'Partial' },
    { id: 'AI-5', name: 'Hallucination Prevention', status: 'gap', label: 'Gap' },
    { id: 'AI-6', name: 'OOD Detection', status: 'gap', label: 'Gap' },
    { id: 'AI-7', name: 'Adversarial Robustness', status: 'partial', label: 'Partial' },
    { id: 'AI-8', name: 'Explainability', status: 'strong', label: 'Strong' },
    { id: 'AI-9', name: 'Human-AI Teaming', status: 'strong', label: 'Strong' },
    { id: 'AI-10', name: 'Privacy and Data Protection', status: 'partial', label: 'Partial' }
  ];
  
  sampleReqs.forEach(r => {
    html += '<div class="ra-req-card s-' + r.status + '">';
    html += '<div class="ra-req-card-id">' + r.id + '</div>';
    html += '<div class="ra-req-card-name">' + r.name + '</div>';
    html += '<div class="ra-req-card-status">' + r.label + '</div>';
    html += '</div>';
  });
  
  html += '</div>';
  
  // Key
  html += '<div class="ra-key">';
  data.statuses.forEach(s => {
    html += '<div class="ra-key-item"><div class="ra-key-dot" style="background:' + s.color + '"></div>' + s.label + '</div>';
  });
  html += '</div>';
  
  html += '</div></div>';
  
  // Callout and link
  html += '<div class="wt-callout" style="margin-top:20px;"><p>' + data.callout + '</p></div>';
  html += '<div style="text-align:center;margin-top:16px;"><a class="ra-link" href="' + data.link + '" target="_blank">Take the Readiness Assessment</a></div>';
  
  return html;
}

function toggleOutline(i) { var el = document.getElementById('outline-' + i); if (el) el.classList.toggle('expanded'); }
function toggleSubSummary(el) { el.classList.toggle('active'); }
function toggleStep(i) { expandedStep = expandedStep === i ? null : i; renderContent(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

render();
</script>
</body>
</html>
