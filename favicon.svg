<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle — dark so it reads on light browser tabs -->
  <circle cx="100" cy="100" r="100" fill="#111110"/>
  <!-- Outermost thin rule -->
  <circle cx="100" cy="100" r="97" stroke="#4A7AB0" stroke-width=".6" opacity=".2"/>
  <!-- Beaded border ring -->
  <circle cx="100" cy="100" r="93" stroke="#4A7AB0" stroke-width="2.8" stroke-dasharray="3.2 3.8" opacity=".4"/>
  <!-- Outer ring solid -->
  <circle cx="100" cy="100" r="89" stroke="#4A7AB0" stroke-width=".8" opacity=".15"/>
  <!-- Text arc: SAFETY CRITICAL LABS on top -->
  <path id="fav-top-arc" d="M 21,100 A 79,79 0 0,1 179,100" fill="none"/>
  <text font-family="'IBM Plex Mono',monospace" font-size="9.2" font-weight="500" letter-spacing="4.8" fill="#4A7AB0" opacity=".7">
    <textPath href="#fav-top-arc" startOffset="50%" text-anchor="middle">SAFETY CRITICAL LABS</textPath>
  </text>
  <!-- Text arc: AI CERTIFICATION AUTHORITY on bottom -->
  <path id="fav-bot-arc" d="M 16,100 A 84,84 0 0,0 184,100" fill="none"/>
  <text font-family="'IBM Plex Mono',monospace" font-size="8" font-weight="400" letter-spacing="3.2" fill="#4A7AB0" opacity=".5">
    <textPath href="#fav-bot-arc" startOffset="50%" text-anchor="middle">AI CERTIFICATION AUTHORITY</textPath>
  </text>
  <!-- Star separators -->
  <text x="14" y="103" text-anchor="middle" font-size="5" fill="#C9943A" opacity=".7">&#x2726;</text>
  <text x="186" y="103" text-anchor="middle" font-size="5" fill="#C9943A" opacity=".7">&#x2726;</text>
  <!-- Inner rules -->
  <circle cx="100" cy="100" r="73" stroke="#4A7AB0" stroke-width=".8" opacity=".15"/>
  <circle cx="100" cy="100" r="70" stroke="#4A7AB0" stroke-width=".4" opacity=".1"/>
  <!-- Seal body -->
  <circle cx="100" cy="100" r="67" fill="#0A1828" stroke="#4A7AB0" stroke-width=".5" opacity=".9"/>
  <!-- HAL iris rings -->
  <circle cx="100" cy="100" r="50" stroke="#4A7AB0" stroke-width="1" fill="none" opacity=".3"/>
  <circle cx="100" cy="100" r="38" stroke="#4A7AB0" stroke-width=".8" fill="none" opacity=".35"/>
  <circle cx="100" cy="100" r="27" stroke="#4A7AB0" stroke-width=".7" fill="none" opacity=".4"/>
  <!-- Aperture tick marks -->
  <line x1="100" y1="70" x2="100" y2="75.5" stroke="#4A7AB0" stroke-width="1.2" stroke-linecap="round" opacity=".45"/>
  <line x1="100" y1="124.5" x2="100" y2="130" stroke="#4A7AB0" stroke-width="1.2" stroke-linecap="round" opacity=".45"/>
  <line x1="70" y1="100" x2="75.5" y2="100" stroke="#4A7AB0" stroke-width="1.2" stroke-linecap="round" opacity=".45"/>
  <line x1="124.5" y1="100" x2="130" y2="100" stroke="#4A7AB0" stroke-width="1.2" stroke-linecap="round" opacity=".45"/>
  <line x1="78.8" y1="78.8" x2="82.7" y2="82.7" stroke="#4A7AB0" stroke-width="1" stroke-linecap="round" opacity=".3"/>
  <line x1="117.3" y1="117.3" x2="121.2" y2="121.2" stroke="#4A7AB0" stroke-width="1" stroke-linecap="round" opacity=".3"/>
  <line x1="121.2" y1="78.8" x2="117.3" y2="82.7" stroke="#4A7AB0" stroke-width="1" stroke-linecap="round" opacity=".3"/>
  <line x1="82.7" y1="117.3" x2="78.8" y2="121.2" stroke="#4A7AB0" stroke-width="1" stroke-linecap="round" opacity=".3"/>
  <!-- Compliance lens — gold ring, navy fill -->
  <circle cx="100" cy="100" r="17" fill="#0A1828" stroke="#C9943A" stroke-width="1.4"/>
  <circle cx="100" cy="100" r="11" fill="#0A1828" stroke="#C9943A" stroke-width=".6" opacity=".5"/>
  <!-- Compliance line — red -->
  <line x1="86" y1="100" x2="114" y2="100" stroke="#C8272D" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Pupil -->
  <circle cx="100" cy="100" r="4.5" fill="#C8272D"/>
  <!-- SCL monogram -->
  <text x="100" y="157" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" font-weight="500" letter-spacing="4" fill="#4A7AB0" opacity=".4">SCL</text>
</svg>
